# .claude/pipeline.yml — Agentic Engineering project config
# Generated by /ae:setup

# --- Test & Lint ---
test:
  command: ""              # e.g., "just check", "npm test", "cargo test"

lint:
  command: ""              # e.g., "just lint", "npm run lint"

# --- Output Directories ---
# Each slot has a default value. Omit or leave empty to use the default.
# All paths are relative to project root.
output:
  discussions: "docs/discussions/"   # ae:analyze, ae:discuss (default: docs/discussions/)
  plans: "docs/plans/"              # ae:plan (default: docs/plans/)
  milestones: "docs/milestones/"    # ae:work (default: docs/milestones/)
  backlog: "docs/backlog/"          # ae:work, ae:review, ae:code-review (default: docs/backlog/)
  reviews: "docs/reviews/"          # ae:review (default: docs/reviews/)
  analyses: "docs/analyses/"        # ae:think (default: docs/analyses/)

# --- Scratch (临时持久化) ---
# Temporary files for session resilience (survives compact/crash).
# Default: ~/.claude/scratch/ (per-project hash, doesn't pollute repo)
# Set to ".claude/scratch/" if you want scratch files in-repo (add to .gitignore).
# scratch: "~/.claude/scratch/"

# --- Project-Specific Agents ---
# By default, ae skills auto-discover agents from .claude/agents/ at runtime.
# Each agent .md file's description is used to classify it (developer, reviewer, etc.).
# Override below ONLY if you want to restrict which agents are used for specific roles.
# agents:
#   developers: []           # e.g., [backend-dev, ios-dev] — for /ae:work parallel execution
#   code_reviewers: []       # e.g., [python-reviewer] — for /ae:code-review

# --- Cross-Family Review ---
# Enable/disable cross-family proxy agents in Agent Teams.
# When enabled, the corresponding proxy agent joins every team.
# When disabled or MCP unavailable, the proxy is simply skipped.
cross_family:
  codex: true              # Include codex-proxy in teams (requires Codex MCP server)
  gemini: true             # Include gemini-proxy in teams (requires ae-gemini MCP server)
  gemini_model: "gemini-2.5-flash"  # Default Gemini model for proxy calls
