# .claude/pipeline.yml — Agentic Engineering project config
# Generated by /ae:setup

# --- Test & Lint ---
test:
  command: ""              # e.g., "just check", "npm test", "cargo test"

lint:
  command: ""              # e.g., "just lint", "npm run lint"

# --- Output Directories ---
output:
  review: "results/reviews/"
  plans: "docs/milestones/"

# --- Project-Specific Agent Roles ---
# Define agents in your project's .claude/agents/ directory.
# The ae: commands will use these roles for team workflows.
agents:
  # Developer agents for /ae:work parallel execution
  # Each should be a .claude/agents/<name>.md file
  developers: []           # e.g., [backend-dev, ios-dev, frontend-dev]

  # Code reviewer agents for /ae:code-review
  # Matched by file type from git diff --stat
  code_reviewers: []       # e.g., [python-reviewer, swift-reviewer, ts-reviewer]

# --- Cross-Family Review ---
# Codex: direct CLI call (avoids 300s MCP timeout)
# Gemini: PAL MCP tools or Gemini CLI
cross_family:
  primary: codex
  codex_profile: review    # -p review for review tasks
  commit_review: codex     # codex -p review review --uncommitted
  plan_review: codex       # codex -p review exec -s read-only "..."
  deep_review: codex       # codex -p review review --base main
  security_audit: codex    # codex review (required) + gemini (optional)
  testgen: codex           # codex -p review exec -s read-only "..."
